models:
  summarizer: qwen2.5:7b
  extractor: llama3.2:3b
  assessor: qwen2.5:7b
  idea_parser: llama3.2:3b
  embedder: nomic-embed-text
  reviewer: qwen2.5:32b

model_timeouts:
  llama3.2:3b: 120
  qwen2.5:7b: 120
  qwen2.5:32b: 600
  gemma4:31b: 600
  deepseek-r1:32b: 600

relevance_threshold: 0.6

synergize_samples: 3

ollama_url: http://localhost:11434

predicate_aliases:
  applicable_to: applies_to
  used_for: uses_method
  achieves: outperforms
  extends: improves_on
  based_on: uses_method
  related: related_to
  utilizes: uses_method
  employs: uses_method

feeds_opml: feeds.opml

db_path: data/researcher.db

projects:
  autostock:
    description: >
      Multi-agent trading system using khonliang for orchestration.
      6 specialist agents (quant, risk, macro, sentiment, compliance, execution)
      with consensus voting, blackboard coordination, and triple-store knowledge.
      Trades volatile stocks with 5-10% swings using mean reversion.
    scope: trading
    depends_on: [khonliang]
    repo: /mnt/dev/ttoll/dev/ollama-roles
  khonliang:
    description: >
      Multi-agent LLM orchestration library with roles, routing, consensus,
      knowledge stores, triple stores, digest synthesis, and MCP server.
    scope: library
    depends_on: []
    repo: /mnt/dev/ttoll/ollama-khonliang
  genealogy:
    description: >
      Family history research tool using khonliang. Multi-agent system with
      researcher, fact-checker, narrator roles. GEDCOM parsing, cross-tree
      entity resolution, knowledge graph for family relationships, agentic
      RAG for historical records, WebSocket chat with session context.
    scope: genealogy
    depends_on: [khonliang]
    repo: /mnt/dev/ttoll/dev/ollama-roles
  researcher-lib:
    description: >
      Shared research/evaluation primitives library. Provides RelevanceScorer,
      entity graph, BaseSynthesizer, BaseQueueWorker, BaseIdeaParser,
      select_best_of_n, and LocalDocReader. Used by both researcher (ingest
      world) and developer (create artifacts) apps.
    scope: library
    depends_on: [khonliang]
    repo: /mnt/dev/ttoll/dev/khonliang-researcher-lib
  khonliang-bus:
    description: >
      Cross-app event bus and service registry. Go server with Python+Go
      clients, HTTP+WebSocket transport, durable subscriptions, pluggable
      backends. Optional infrastructure that any app can register with for
      push notifications and service discovery.
    scope: infrastructure
    depends_on: [khonliang]
    repo: /mnt/dev/ttoll/dev/khonliang-bus
  researcher:
    description: >
      Automated research pipeline: RSS/search -> fetch -> distill ->
      concept graph -> synergize -> FR generation. MCP server for
      project Claudes to consume research insights.
    scope: research
    depends_on: [khonliang, researcher-lib]
    repo: /mnt/dev/ttoll/dev/khonliang-researcher
  developer:
    description: >
      Development lifecycle MCP server. Inverse of researcher: ingests
      specs/milestones/FRs, evaluates them against the research corpus
      using local LLM best-of-N, manages git worktrees per FR, bundles
      related FRs into work units, and dispatches pre-evaluated work
      packages to Claude with full evidence chains. Talks to researcher
      via khonliang-bus for on-demand corpus operations. Lets Claude
      focus purely on code and code review.
    scope: development
    depends_on: [khonliang, researcher-lib, khonliang-bus]
    repo: /mnt/dev/ttoll/dev/khonliang-developer
